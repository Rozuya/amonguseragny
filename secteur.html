<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bravo ! - Mission Réussie</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap" rel="stylesheet">
    <style>
        :root {
            --lyoko-green: #00ff66;
            --lyoko-blue: #00ccff;
            --bg-dark: #05080a;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background-color: var(--bg-dark);
            color: #ffffff;
            font-family: 'Share Tech Mono', monospace;
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            padding: 20px;
        }

        .success-box {
            background: rgba(8, 12, 20, 0.9);
            border: 3px solid var(--lyoko-green);
            border-radius: 15px;
            box-shadow: 0 0 35px rgba(0, 255, 102, 0.4);
            padding: 40px 20px;
            max-width: 500px;
            width: 100%;
        }

        h1 {
            color: var(--lyoko-green);
            font-size: 2.5rem;
            text-shadow: 0 0 15px var(--lyoko-green);
            margin-bottom: 20px;
        }

        p {
            color: var(--lyoko-blue);
            font-size: 1.3rem;
            margin-bottom: 30px;
            line-height: 1.5;
        }

        .restart-btn {
            background-color: var(--lyoko-green);
            color: #000;
            border: none;
            padding: 15px 30px;
            font-family: 'Share Tech Mono', monospace;
            font-size: 1.2rem;
            font-weight: bold;
            border-radius: 8px;
            cursor: pointer;
            text-transform: uppercase;
            box-shadow: 0 0 15px var(--lyoko-green);
            transition: 0.3s;
            width: 100%;
        }

        .restart-btn:hover {
            background-color: var(--lyoko-blue);
            box-shadow: 0 0 25px var(--lyoko-blue);
        }

        @media (max-width: 480px) {
            h1 { font-size: 1.8rem; }
            p { font-size: 1.1rem; }
            .restart-btn { font-size: 1rem; }
        }
    </style>
</head>
<body>

    <div class="success-box">
        <h1>🎉 BRAVO ! 🎉</h1>
        <p>TU AS TROUVÉ LA BONNE RÉPONSE !</p>
        
        <button class="restart-btn" onclick="window.location.href='index.html'">
            🔄 JOUEUR SUIVANT
        </button>
    </div>

</body>
</html>
