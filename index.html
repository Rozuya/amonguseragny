<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Supercalculateur - Accès Sécurisé</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap" rel="stylesheet">
    <style>
        :root {
            --lyoko-green: #00ff66;
            --lyoko-blue: #00ccff;
            --bg-dark: #05080a;
            --error-red: #ff3366;
            --text-main: #e0e0e0;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background-color: var(--bg-dark);
            color: var(--lyoko-green);
            font-family: 'Share Tech Mono', monospace;
            height: 100vh;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        #matrix-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            opacity: 0.4;
        }

        /* BARRE D'AUDIO EN HAUT */
        .audio-controls {
            position: fixed;
            top: 15px;
            right: 15px;
            background: rgba(8, 12, 20, 0.95);
            border: 1px solid var(--lyoko-blue);
            border-radius: 8px;
            padding: 10px 15px;
            display: flex;
            align-items: center;
            gap: 12px;
            z-index: 50;
            box-shadow: 0 0 10px rgba(0, 204, 255, 0.3);
        }

        .music-btn {
            background: var(--error-red);
            color: #ffffff;
            border: none;
            padding: 6px 12px;
            font-family: 'Share Tech Mono', monospace;
            font-weight: bold;
            font-size: 0.9rem;
            cursor: pointer;
            border-radius: 4px;
            transition: 0.2s;
        }

        .music-btn:hover {
            opacity: 0.9;
        }

        .volume-container {
            display: flex;
            align-items: center;
            gap: 8px;
            color: var(--lyoko-blue);
            font-size: 0.9rem;
        }

        input[type="range"] {
            accent-color: var(--lyoko-green);
            cursor: pointer;
            width: 90px;
        }

        /* TERMINAL PRINCIPAL */
        .terminal-container {
            background: rgba(8, 12, 20, 0.9);
            border: 2px solid var(--lyoko-green);
            border-radius: 10px;
            box-shadow: 0 0 30px rgba(0, 255, 102, 0.3);
            padding: 30px;
            width: 90%;
            max-width: 650px;
            text-align: center;
            z-index: 10;
            position: relative;
        }

        h1 {
            font-size: 2rem;
            color: var(--lyoko-blue);
            text-transform: uppercase;
            margin-bottom: 15px;
            text-shadow: 0 0 15px var(--lyoko-blue);
            letter-spacing: 2px;
        }

        .status-bar {
            font-size: 1.1rem;
            margin-bottom: 25px;
            color: #fff;
            border-bottom: 1px solid rgba(0, 255, 102, 0.3);
            padding-bottom: 10px;
        }

        .riddle-box {
            background: rgba(0, 0, 0, 0.6);
            border: 1px dashed var(--lyoko-blue);
            padding: 20px;
            border-radius: 5px;
            text-align: left;
            margin-bottom: 25px;
            line-height: 1.6;
            color: var(--text-main);
            font-size: 1.2rem;
        }

        .riddle-box p {
            margin-bottom: 10px;
        }

        .input-group {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        input[type="text"] {
            width: 100%;
            padding: 15px;
            background: #000;
            border: 1px solid var(--lyoko-green);
            color: var(--lyoko-green);
            font-family: 'Share Tech Mono', monospace;
            font-size: 1.2rem;
            outline: none;
            border-radius: 4px;
            text-align: center;
        }

        input[type="text"]:focus {
            box-shadow: 0 0 10px var(--lyoko-green);
        }

        .validate-btn {
            width: 100%;
            padding: 15px;
            background: var(--lyoko-green);
            color: #000;
            font-family: 'Share Tech Mono', monospace;
            font-size: 1.2rem;
            font-weight: bold;
            text-transform: uppercase;
            border: none;
            cursor: pointer;
            border-radius: 4px;
            transition: all 0.3s ease;
        }

        .validate-btn:hover {
            background: var(--lyoko-blue);
            box-shadow: 0 0 20px var(--lyoko-blue);
        }

        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.85);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 100;
            padding: 20px;
        }

        .modal {
            background: #0a1118;
            border: 2px solid var(--lyoko-blue);
            border-radius: 8px;
            padding: 30px;
            text-align: center;
            max-width: 450px;
            width: 100%;
            box-shadow: 0 0 30px var(--lyoko-blue);
            animation: modalFadeIn 0.3s ease;
        }

        @keyframes modalFadeIn {
            from { opacity: 0; transform: translateY(-20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .modal h2 {
            font-size: 1.8rem;
            margin-bottom: 15px;
            text-transform: uppercase;
        }

        .modal p {
            color: #fff;
            font-size: 1.1rem;
            margin-bottom: 25px;
            line-height: 1.5;
        }

        .modal-btn {
            width: auto;
            padding: 12px 25px;
            font-size: 1rem;
        }

        @media (max-width: 480px) {
            h1 { font-size: 1.5rem; }
            .terminal-container { padding: 20px; }
            .riddle-box, input[type="text"], .validate-btn { font-size: 1rem; }
            .audio-controls { top: 10px; right: 10px; padding: 5px 10px; }
        }
    </style>
</head>
<body>

    <canvas id="matrix-bg"></canvas>

    <audio id="bg-music" loop preload="auto">
        <source src="A World Without Danger.mp3" type="audio/mpeg">
    </audio>

    <div class="audio-controls">
        <button id="toggle-music" class="music-btn" onclick="toggleMusic()">🔇 MUSIQUE : OFF</button>
        <div class="volume-container">
            <input type="range" id="volume-slider" min="0" max="1" step="0.01" value="0.5" oninput="changeVolume(this.value)" onchange="changeVolume(this.value)">
            <span id="volume-text">50%</span>
        </div>
    </div>

    <div class="terminal-container">
        <h1>SUPERCALCULATEUR : ACCÈS</h1>
        <div class="status-bar">
            ENTREZ LE CODE POUR DÉVERROUILLER LE SITE
        </div>

        <div class="riddle-box">
            <p>Je peux mélanger des lettres et des chiffres.</p>
            <p>Sans moi, impossible de te connecter à ton jeu ou à ton compte...</p>
            <p>Mais attention : je dois absolument rester <strong>SECRET</strong> !</p>
            <br>
            <p><strong>Que suis-je ?</strong></p>
        </div>

        <div class="input-group">
            <input type="text" id="answer" placeholder="Écris ta réponse ici..." autocomplete="off">
            <button class="validate-btn" onclick="validateCode()">VALIDER</button>
        </div>
    </div>

    <div class="modal-overlay" id="popup">
        <div class="modal">
            <h2 id="pop-title">TITRE</h2>
            <p id="pop-msg">MESSAGE</p>
            <button class="modal-btn" id="pop-btn">BOUTON</button>
        </div>
    </div>

    <script>
        // --- GESTION MUSIQUE ET VOLUME ---
        const audio = document.getElementById('bg-music');
        const musicBtn = document.getElementById('toggle-music');
        const volumeSlider = document.getElementById('volume-slider');
        const volumeText = document.getElementById('volume-text');

        audio.volume = parseFloat(volumeSlider.value);

        function toggleMusic() {
            if (audio.paused) {
                audio.play().then(() => {
                    musicBtn.innerText = "🔊 MUSIQUE : ON";
                    musicBtn.style.background = "var(--lyoko-blue)";
                    musicBtn.style.color = "#000";
                }).catch((error) => {
                    console.error("Erreur de lecture :", error);
                    alert("Impossible de lire la musique. Vérifie que le fichier 'A World Without Danger.mp3' est bien placé au même endroit sur GitHub !");
                });
            } else {
                audio.pause();
                musicBtn.innerText = "🔇 MUSIQUE : OFF";
                musicBtn.style.background = "var(--error-red)";
                musicBtn.style.color = "#fff";
            }
        }

        function changeVolume(val) {
            audio.volume = parseFloat(val);
            const percent = Math.round(val * 100);
            volumeText.innerText = percent + "%";
        }

        // --- ANIMATION DE FOND (MATRIX) ---
        const canvas = document.getElementById('matrix-bg');
        const ctx = canvas.getContext('2d');

        function resizeCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        window.addEventListener('resize', resizeCanvas);
        resizeCanvas();

        const chars = "0123456789アァカサタナハマヤャラワガザダバパイィキシチニヒミリヰギジヂビピウゥクスツヌフムユュルグズブヅプエェケセテネヘメレヱゲゼデベペオォコソトノホモヨョロヲゴゾドボポヴッン";
        const charArray = chars.split('');
        const fontSize = 16;
        const columns = canvas.width / fontSize;
        const drops = [];

        for (let x = 0; x < columns; x++) {
            drops[x] = 1;
        }

        function drawMatrix() {
            ctx.fillStyle = "rgba(5, 8, 10, 0.05)";
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            ctx.fillStyle = "#00ff66";
            ctx.font = fontSize + "px monospace";

            for (let i = 0; i < drops.length; i++) {
                const text = charArray[Math.floor(Math.random() * charArray.length)];
                ctx.fillText(text, i * fontSize, drops[i] * fontSize);

                if (drops[i] * fontSize > canvas.height && Math.random() > 0.975) {
                    drops[i] = 0;
                }
                drops[i]++;
            }
        }
        setInterval(drawMatrix, 35);

        // --- VALIDATION ÉNIGME MOT DE PASSE ---
        const validAnswers = [
            "mot de passe", 
            "un mot de passe", 
            "le mot de passe", 
            "motdepasse",
            "un motdepasse",
            "code",
            "un code",
            "le code",
            "code secret",
            "un code secret",
            "le code secret",
            "password"
        ];

        document.getElementById('answer').addEventListener('keypress', function (e) {
            if (e.key === 'Enter') {
                validateCode();
            }
        });

        function validateCode() {
            const inputField = document.getElementById('answer');
            const userInput = inputField.value.toLowerCase().trim();
            const popup = document.getElementById('popup');
            const title = document.getElementById('pop-title');
            const msg = document.getElementById('pop-msg');
            const btn = document.getElementById('pop-btn');

            if (userInput === "") return;

            if (validAnswers.includes(userInput)) {
                window.location.href = "secteur.html";
            } else {
                title.innerText = "INCORRECT !";
                title.style.color = "var(--error-red)";
                msg.innerText = "Ce n'est pas la bonne réponse. Réessaye encore !";
                btn.innerText = "RÉESSAYER";
                btn.onclick = function() {
